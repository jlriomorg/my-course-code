name: Manually Triggered
on:
  workflow_dispatch:
    inputs:
      string:
        description: A string input
        type: string
        required: true
        default: "Default value"
      string2:
        description: A string input
        type: string
        required: true
        default: "Default value"
      my-number:
        description: number input
        type: number
        required: true
        default: 2
      option1:
        description: options
        type: choice
        required: true
        default: OPT2
        options:
          - OPT1
          - OPT2
          - OPT3
      boolean1:
        description: boolean type
        required: false
        type: boolean
      environment:
        description: "Environment"
        type: environment
jobs:
    log-info:
      runs-on: ubuntu-latest
      steps:
        - run: echo $GITHUB_REF
        - run: | 
            echo "String: ${{ inputs.string }}"
            echo "String2: ${{ inputs.string2 }}"
            echo "my-number: ${{ inputs.my-number }}"
            echo "option1: ${{ inputs.option1 }}"
            echo "boolean1: ${{ inputs.boolean1 }}"
            echo "environment: ${{ inputs.environment }}"
